{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block public_content %}
<main class="grid min-h-screen place-items-center px-5">
  <form method="post" action="/admin/login" class="w-full max-w-sm rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
    <div class="mb-6">
      <div class="text-lg font-semibold">LLM Gateway</div>
      <div class="mt-1 text-sm text-zinc-500">Admin / User Portal</div>
    </div>
    {% if error %}
      <div class="mb-4 rounded border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">{{ error }}</div>
    {% endif %}
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label class="block text-sm font-medium" for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required class="mt-1 h-10 w-full rounded border border-zinc-300 px-3 text-sm outline-none focus:border-zinc-900">
    <label class="mt-4 block text-sm font-medium" for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-1 h-10 w-full rounded border border-zinc-300 px-3 text-sm outline-none focus:border-zinc-900">
    <button type="submit" class="mt-6 inline-flex h-10 w-full items-center justify-center rounded bg-zinc-950 px-4 text-sm font-medium text-white hover:bg-zinc-800">Login</button>
  </form>
</main>
{% endblock %}
