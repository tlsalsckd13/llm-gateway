services:
  gateway:
    image: portkeyai/gateway:latest
    container_name: portkey-gateway
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .aws-creds.env
    environment:
      - LOG_STORE=file
      - PORT=8787
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
    volumes:
      - ./gateway-logs:/app/logs
      - ./configs:/app/configs:ro
    networks:
      - llm-net

  usage-collector:
    image: 061051247564.dkr.ecr.ap-northeast-2.amazonaws.com/kcs-llm-gateway/usage-collector:${USAGE_COLLECTOR_TAG:-latest}
    container_name: usage-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORTKEY_URL=http://gateway:8787/v1/chat/completions
    depends_on:
      - gateway
    networks:
      - llm-net

  gateway-web:
    image: 061051247564.dkr.ecr.ap-northeast-2.amazonaws.com/kcs-llm-gateway/gateway-web:${GATEWAY_WEB_TAG:-latest}
    container_name: gateway-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    env_file:
      - .env
    environment:
      - COLLECTOR_URL=http://usage-collector:8080
      - AWS_DEFAULT_REGION=ap-northeast-2
    depends_on:
      - usage-collector
    networks:
      - llm-net

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - usage-collector
      - gateway-web
    networks:
      - llm-net

networks:
  llm-net:
    driver: bridge
