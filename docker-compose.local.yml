services:
  gateway:
    image: portkeyai/gateway:latest
    container_name: portkey-gateway-local
    ports:
      - "8787:8787"
    environment:
      - LOG_STORE=file
      - PORT=8787
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
    volumes:
      - ./gateway-logs:/app/logs
      - ./configs:/app/configs:ro
    networks:
      - llm-net

  usage-collector:
    build: ./usage-collector
    image: kcs-llm-gateway/usage-collector:local
    container_name: usage-collector-local
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      - PORTKEY_URL=http://gateway:8787/v1/chat/completions
    depends_on:
      - gateway
    networks:
      - llm-net

networks:
  llm-net:
    driver: bridge
